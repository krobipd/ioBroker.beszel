<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Background circle -->
  <circle cx="50" cy="50" r="48" fill="#1a1a2e" stroke="#4a90e2" stroke-width="2"/>
  <!-- Server rack body -->
  <rect x="22" y="20" width="56" height="60" rx="4" ry="4" fill="#16213e" stroke="#4a90e2" stroke-width="1.5"/>
  <!-- Server slots -->
  <rect x="27" y="26" width="46" height="8" rx="2" ry="2" fill="#0f3460" stroke="#4a90e2" stroke-width="1"/>
  <rect x="27" y="38" width="46" height="8" rx="2" ry="2" fill="#0f3460" stroke="#4a90e2" stroke-width="1"/>
  <rect x="27" y="50" width="46" height="8" rx="2" ry="2" fill="#0f3460" stroke="#4a90e2" stroke-width="1"/>
  <rect x="27" y="62" width="46" height="8" rx="2" ry="2" fill="#0f3460" stroke="#4a90e2" stroke-width="1"/>
  <!-- Status LEDs -->
  <circle cx="65" cy="30" r="2.5" fill="#00ff88"/>
  <circle cx="65" cy="42" r="2.5" fill="#00ff88"/>
  <circle cx="65" cy="54" r="2.5" fill="#ffaa00"/>
  <circle cx="65" cy="66" r="2.5" fill="#00ff88"/>
  <!-- Activity lines -->
  <line x1="32" y1="30" x2="55" y2="30" stroke="#4a90e2" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="32" y1="42" x2="50" y2="42" stroke="#4a90e2" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="32" y1="54" x2="58" y2="54" stroke="#ffaa00" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="32" y1="66" x2="52" y2="66" stroke="#4a90e2" stroke-width="1.5" stroke-linecap="round"/>
</svg>
